<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiabeTrack - More Symptoms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/app.css">
    <script defer src="/static/js/theme-toggle.js"></script>
    <script defer src="/static/js/interactive.js"></script>
</head>
<body class="page-shell theme-light">
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">☾</button>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card">
                    <div class="card-header">
                        <h2 class="mb-0">Additional Symptoms</h2>
                        <p class="mb-0 mt-2">Step 4 of 6</p>
                        <div class="progress mt-3">
                            <div class="progress-bar" role="progressbar" style="width: 60%" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                    <div class="card-body">
                        <form action="{{ url_for('process_question_2') }}" method="post">
                            <div class="mb-4">
                                <p class="question-text">Do you often feel tired or weak?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="tired_weak" id="tired_yes" value="yes" required>
                                    <label class="form-check-label" for="tired_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="tired_weak" id="tired_no" value="no">
                                    <label class="form-check-label" for="tired_no">No</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <p class="question-text">Do you experience blurred vision?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="blurred_vision" id="vision_yes" value="yes" required>
                                    <label class="form-check-label" for="vision_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="blurred_vision" id="vision_no" value="no">
                                    <label class="form-check-label" for="vision_no">No</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <p class="question-text">Do your wounds take a long time to heal?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="slow_healing" id="healing_yes" value="yes" required>
                                    <label class="form-check-label" for="healing_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="slow_healing" id="healing_no" value="no">
                                    <label class="form-check-label" for="healing_no">No</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <p class="question-text">Do you experience numbness or tingling in your hands or feet?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="numbness_tingling" id="numbness_yes" value="yes" required>
                                    <label class="form-check-label" for="numbness_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="numbness_tingling" id="numbness_no" value="no">
                                    <label class="form-check-label" for="numbness_no">No</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <p class="question-text">Do you have frequent skin or urinary infections?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="frequent_infections" id="infections_yes" value="yes" required>
                                    <label class="form-check-label" for="infections_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="frequent_infections" id="infections_no" value="no">
                                    <label class="form-check-label" for="infections_no">No</label>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="{{ url_for('question_1') }}" class="btn btn-secondary">Back</a>
                                <button type="submit" class="btn btn-primary">Next</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
