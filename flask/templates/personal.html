<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiabeTrack - Personal Information</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/app.css">
    <script defer src="/static/js/theme-toggle.js"></script>
    <script defer src="/static/js/interactive.js"></script>
</head>
<body class="page-shell theme-light">
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">☾</button>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card">
                    <div class="card-header">
                        <h2 class="mb-0">Personal Information</h2>
                        <p class="mb-0 mt-2">Step 2 of 6</p>
                        <div class="progress mt-3">
                            <div class="progress-bar" role="progressbar" style="width: 20%" aria-valuenow="20" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                    <div class="card-body">
                        <form action="{{ url_for('process_personal') }}" method="post">
                            <div class="mb-3">
                                <label for="age" class="form-label">What is your age?</label>
                                <input type="number" class="form-control" id="age" name="age" required min="1" max="120">
                            </div>
                            <div class="mb-3">
                                <label for="gender" class="form-label">What is your gender?</label>
                                <select class="form-control" id="gender" name="gender" required>
                                    <option value="">Select gender</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="height" class="form-label">What is your height (in cm)?</label>
                                <input type="number" class="form-control" id="height" name="height" required min="50" max="250" step="0.1">
                            </div>
                            <div class="mb-3">
                                <label for="weight" class="form-label">What is your weight (in kg)?</label>
                                <input type="number" class="form-control" id="weight" name="weight" required min="20" max="300" step="0.1">
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Next</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
