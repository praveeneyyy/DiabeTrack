<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiabeTrack - Health Conditions & Lifestyle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/app.css">
    <script defer src="/static/js/theme-toggle.js"></script>
    <script defer src="/static/js/interactive.js"></script>
</head>
<body class="page-shell theme-light">
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">☾</button>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card">
                    <div class="card-header">
                        <h2 class="mb-0">Health Conditions & Lifestyle</h2>
                        <p class="mb-0 mt-2">Step 5 of 6</p>
                        <div class="progress mt-3">
                            <div class="progress-bar" role="progressbar" style="width: 80%" aria-valuenow="80" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                    <div class="card-body">
                        <form action="{{ url_for('process_question_3') }}" method="post">
                            <div class="mb-4">
                                <p class="question-text">Do you have high blood pressure?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="high_bp" id="bp_yes" value="yes" required>
                                    <label class="form-check-label" for="bp_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="high_bp" id="bp_no" value="no">
                                    <label class="form-check-label" for="bp_no">No</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <p class="question-text">Do you have high cholesterol?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="high_cholesterol" id="cholesterol_yes" value="yes" required>
                                    <label class="form-check-label" for="cholesterol_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="high_cholesterol" id="cholesterol_no" value="no">
                                    <label class="form-check-label" for="cholesterol_no">No</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="blood_glucose" class="form-label question-text">What is your blood glucose level (if known)?</label>
                                <input type="number" class="form-control" id="blood_glucose" name="blood_glucose" placeholder="mg/dL (leave blank if unknown)" min="0" max="500" step="0.1">
                            </div>
                            <div class="mb-4">
                                <label for="hba1c" class="form-label question-text">What is your HbA1c level (if known)?</label>
                                <input type="number" class="form-control" id="hba1c" name="hba1c" placeholder="% (leave blank if unknown)" min="0" max="20" step="0.1">
                            </div>
                            <div class="mb-4">
                                <p class="question-text">How often do you exercise?</p>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="exercise" id="exercise_daily" value="daily" required>
                                    <label class="form-check-label" for="exercise_daily">Daily</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="exercise" id="exercise_weekly" value="weekly">
                                    <label class="form-check-label" for="exercise_weekly">Weekly</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="exercise" id="exercise_rarely" value="rarely">
                                    <label class="form-check-label" for="exercise_rarely">Rarely</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="exercise" id="exercise_never" value="never">
                                    <label class="form-check-label" for="exercise_never">Never</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <p class="question-text">How often do you consume sugary foods or soft drinks?</p>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="sugary_foods" id="sugary_frequently" value="frequently" required>
                                    <label class="form-check-label" for="sugary_frequently">Frequently</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="sugary_foods" id="sugary_sometimes" value="sometimes">
                                    <label class="form-check-label" for="sugary_sometimes">Sometimes</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="sugary_foods" id="sugary_rarely" value="rarely">
                                    <label class="form-check-label" for="sugary_rarely">Rarely</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="sugary_foods" id="sugary_never" value="never">
                                    <label class="form-check-label" for="sugary_never">Never</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <p class="question-text">Do you smoke?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="smoke" id="smoke_yes" value="yes" required>
                                    <label class="form-check-label" for="smoke_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="smoke" id="smoke_no" value="no">
                                    <label class="form-check-label" for="smoke_no">No</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <p class="question-text">Do you consume alcohol regularly?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="alcohol" id="alcohol_yes" value="yes" required>
                                    <label class="form-check-label" for="alcohol_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="alcohol" id="alcohol_no" value="no">
                                    <label class="form-check-label" for="alcohol_no">No</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="sleep_hours" class="form-label question-text">How many hours do you sleep per day?</label>
                                <input type="number" class="form-control" id="sleep_hours" name="sleep_hours" required min="0" max="24" step="0.5">
                            </div>
                            <div class="mb-4">
                                <p class="question-text">What is your stress level?</p>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="stress" id="stress_low" value="low" required>
                                    <label class="form-check-label" for="stress_low">Low</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="stress" id="stress_moderate" value="moderate">
                                    <label class="form-check-label" for="stress_moderate">Moderate</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="stress" id="stress_high" value="high">
                                    <label class="form-check-label" for="stress_high">High</label>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="{{ url_for('question_2') }}" class="btn btn-secondary">Back</a>
                                <button type="submit" class="btn btn-primary">Next</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
