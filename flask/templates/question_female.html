<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiabeTrack - Female-Specific Questions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/app.css">
    <script defer src="/static/js/theme-toggle.js"></script>
    <script defer src="/static/js/interactive.js"></script>
</head>
<body class="page-shell theme-light">
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">☾</button>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card">
                    <div class="card-header">
                        <h2 class="mb-0">Female-Specific Questions</h2>
                        <p class="mb-0 mt-2">Step 6 of 6</p>
                        <div class="progress mt-3">
                            <div class="progress-bar" role="progressbar" style="width: 100%" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                    <div class="card-body">
                        <form action="{{ url_for('process_female') }}" method="post">
                            <div class="mb-4">
                                <p class="question-text">Have you ever been diagnosed with prediabetes?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="prediabetes" id="prediabetes_yes" value="yes" required>
                                    <label class="form-check-label" for="prediabetes_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="prediabetes" id="prediabetes_no" value="no">
                                    <label class="form-check-label" for="prediabetes_no">No</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <p class="question-text">Are you currently taking diabetes medication?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="diabetes_medication" id="medication_yes" value="yes" required>
                                    <label class="form-check-label" for="medication_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="diabetes_medication" id="medication_no" value="no">
                                    <label class="form-check-label" for="medication_no">No</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <p class="question-text">Have you had gestational diabetes during pregnancy?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gestational_diabetes" id="gestational_yes" value="yes" required>
                                    <label class="form-check-label" for="gestational_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gestational_diabetes" id="gestational_no" value="no">
                                    <label class="form-check-label" for="gestational_no">No</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <p class="question-text">Have you been diagnosed with PCOS (Polycystic Ovary Syndrome)?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="pcos" id="pcos_yes" value="yes" required>
                                    <label class="form-check-label" for="pcos_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="pcos" id="pcos_no" value="no">
                                    <label class="form-check-label" for="pcos_no">No</label>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="{{ url_for('question_3') }}" class="btn btn-secondary">Back</a>
                                <button type="submit" class="btn btn-primary">Get Report</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
