<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiabeTrack - Health Symptoms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/app.css">
    <script defer src="/static/js/theme-toggle.js"></script>
    <script defer src="/static/js/interactive.js"></script>
</head>
<body class="page-shell theme-light">
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">☾</button>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card">
                    <div class="card-header">
                        <h2 class="mb-0">Health Symptoms</h2>
                        <p class="mb-0 mt-2">Step 3 of 6</p>
                        <div class="progress mt-3">
                            <div class="progress-bar" role="progressbar" style="width: 40%" aria-valuenow="40" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                    <div class="card-body">
                        <form action="{{ url_for('process_question_1') }}" method="post">
                            <div class="mb-4">
                                <p class="question-text">Do you have a family history of diabetes?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="family_history" id="family_yes" value="yes" required>
                                    <label class="form-check-label" for="family_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="family_history" id="family_no" value="no">
                                    <label class="form-check-label" for="family_no">No</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <p class="question-text">Do you experience frequent urination?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="frequent_urination" id="urination_yes" value="yes" required>
                                    <label class="form-check-label" for="urination_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="frequent_urination" id="urination_no" value="no">
                                    <label class="form-check-label" for="urination_no">No</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <p class="question-text">Do you often feel excessive thirst?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="excessive_thirst" id="thirst_yes" value="yes" required>
                                    <label class="form-check-label" for="thirst_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="excessive_thirst" id="thirst_no" value="no">
                                    <label class="form-check-label" for="thirst_no">No</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <p class="question-text">Do you frequently feel hungry even after eating?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="frequent_hunger" id="hunger_yes" value="yes" required>
                                    <label class="form-check-label" for="hunger_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="frequent_hunger" id="hunger_no" value="no">
                                    <label class="form-check-label" for="hunger_no">No</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <p class="question-text">Have you experienced sudden weight loss recently?</p>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="sudden_weight_loss" id="weight_loss_yes" value="yes" required>
                                    <label class="form-check-label" for="weight_loss_yes">Yes</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="sudden_weight_loss" id="weight_loss_no" value="no">
                                    <label class="form-check-label" for="weight_loss_no">No</label>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="{{ url_for('home') }}" class="btn btn-secondary">Back</a>
                                <button type="submit" class="btn btn-primary">Next</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
